<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Physics Marking Training</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }

.login-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); }
.login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; min-width: 360px; }
.login-box h1 { font-size: 24px; margin-bottom: 8px; color: #333; }
.login-box p { color: #666; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; outline: none; }
.login-box input:focus { border-color: #e74c3c; }
.login-box button { margin-top: 16px; width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
.login-box button:hover { background: #c0392b; }
.error-msg { color: #e74c3c; margin-top: 8px; font-size: 14px; }

.admin-page { padding: 24px; max-width: 1200px; margin: 0 auto; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.stat-card h3 { font-size: 14px; color: #666; margin-bottom: 8px; }
.stat-card .stat-value { font-size: 36px; font-weight: 700; color: #333; }

.results-table { width: 100%; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.results-table table { width: 100%; border-collapse: collapse; }
.results-table th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-size: 13px; color: #666; border-bottom: 2px solid #eee; position: sticky; top: 0; }
.results-table td { padding: 10px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
.results-table tr:hover { background: #f8f9fa; }
.diff-pos { color: #e74c3c; font-weight: 600; }
.diff-neg { color: #3498db; font-weight: 600; }
.diff-zero { color: #27ae60; font-weight: 600; }

.header { background: #fff; padding: 12px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; border-radius: 12px; }
.header h2 { margin: 0; }
.header button { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-left: 8px; }
.loading { text-align: center; padding: 40px; color: #888; font-size: 16px; }
.hidden { display: none !important; }

/* Expandable rows */
.expand-btn { background: none; border: 1px solid #ddd; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px; }
.expand-btn:hover { background: #f0f0f0; }
.detail-row td { background: #fafafa; padding: 12px 16px 12px 48px; }
.detail-table { width: auto; border-collapse: collapse; font-size: 13px; }
.detail-table th { padding: 4px 10px; font-size: 12px; background: #eee; }
.detail-table td { padding: 4px 10px; border-bottom: 1px solid #eee; }
</style>
</head>
<body>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="login-page">
  <div class="login-box">
    <h1>Admin Panel</h1>
    <p>Physics Marking Training</p>
    <input type="password" id="pwdInput" placeholder="Enter admin password" autofocus>
    <div class="error-msg hidden" id="errorMsg">Incorrect password</div>
    <button onclick="adminLogin()">Login</button>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminDash" class="hidden">
  <div class="admin-page">
    <div class="header">
      <h2>Admin Dashboard</h2>
      <div>
        <button onclick="loadAdminData()">Refresh</button>
        <button onclick="exportCSV()">Export CSV</button>
        <button onclick="location.reload()">Logout</button>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <h3 style="margin-bottom: 12px;">All Results</h3>
    <div class="results-table" id="resultsTable">
      <div class="loading">Loading...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>
</body>
</html>
